<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>استطلاع ركاب — RDMC 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════ RESET & BASE ═══════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Cairo',sans-serif;color:#fff;min-height:100vh;
  overflow-x:hidden;direction:rtl;font-size:16px;-webkit-font-smoothing:antialiased}

/* ═══════════ THEME VARIABLES (swapped per survey) ═══════════ */
/* GL3 theme = teal */
.theme-gl3{
  --c1:#00AB8E;--c2:#00E5C0;--c3:#5DDFFF;--c4:#48A9C5;
  --dark:#0A1A28;--glass:rgba(0,90,120,0.22);--gb:rgba(0,229,192,0.18);
  --grad:linear-gradient(135deg,#00AB8E 0%,#48A9C5 50%,#00E5C0 100%);
  --dot:rgba(0,229,192,.05);--glow:rgba(0,229,192,.45);
  --bg1:rgba(0,171,142,.2);--bg2:rgba(0,79,113,.28);
  --txtdark:#0A1A28;
}
/* LRT theme = maroon + grey */
.theme-lrt{
  --c1:#8B1A2B;--c2:#C0392B;--c3:#E8A0A8;--c4:#9E9E9E;
  --dark:#1A0A0D;--glass:rgba(80,20,30,0.28);--gb:rgba(192,57,43,0.22);
  --grad:linear-gradient(135deg,#6B1520 0%,#8B1A2B 45%,#C0392B 100%);
  --dot:rgba(192,57,43,.06);--glow:rgba(192,57,43,.45);
  --bg1:rgba(139,26,43,.25);--bg2:rgba(80,20,30,.35);
  --txtdark:#1A0A0D;
}

/* ═══════════ ANIMATED BACKGROUND ═══════════ */
.bg{position:fixed;inset:0;z-index:0;transition:background .6s}
.theme-gl3 .bg{background:radial-gradient(ellipse 100% 80% at 10% 0%,rgba(0,171,142,.2) 0%,transparent 55%),
  radial-gradient(ellipse 70% 70% at 90% 100%,rgba(0,79,113,.28) 0%,transparent 55%),#0A1A28}
.theme-lrt .bg{background:radial-gradient(ellipse 100% 80% at 10% 0%,rgba(139,26,43,.25) 0%,transparent 55%),
  radial-gradient(ellipse 70% 70% at 90% 100%,rgba(60,60,70,.4) 0%,transparent 55%),#1A0A0D}
.bg::after{content:'';position:absolute;inset:0;
  background-image:radial-gradient(var(--dot,rgba(0,229,192,.05)) 1px,transparent 1px);
  background-size:26px 26px;pointer-events:none}

/* track lines */
.tl{position:fixed;left:0;right:0;height:2px;opacity:.18;
  animation:tls 4s linear infinite;pointer-events:none}
.theme-gl3 .tl{background:linear-gradient(90deg,transparent,#00E5C0,#5DDFFF,transparent)}
.theme-lrt .tl{background:linear-gradient(90deg,transparent,#C0392B,#9E9E9E,transparent)}
.tl:nth-child(2){top:18%}.tl:nth-child(3){top:65%;animation-delay:2s;opacity:.08}
@keyframes tls{0%{transform:translateX(-110%)}100%{transform:translateX(110%)}}

/* particles */
.pt{position:fixed;width:3px;height:3px;border-radius:50%;pointer-events:none;opacity:0;animation:ptf 7s linear infinite}
@keyframes ptf{0%{transform:translateY(100vh);opacity:0}8%{opacity:.55}92%{opacity:.2}100%{transform:translateY(-10vh) translateX(16px);opacity:0}}

#app{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom)}

/* ═══════════ LANDING PICKER ═══════════ */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem 1.25rem;text-align:center;animation:fdi .8s ease;
  background:radial-gradient(ellipse 100% 80% at 10% 0%,rgba(0,171,142,.12) 0%,transparent 50%),
  radial-gradient(ellipse 80% 80% at 90% 100%,rgba(139,26,43,.15) 0%,transparent 50%),#0D1520}
@keyframes fdi{from{opacity:0}to{opacity:1}}

.landing-logo{font-size:2.8rem;margin-bottom:1.5rem;animation:flt 3s ease-in-out infinite}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.landing-title{font-size:clamp(1.4rem,6vw,2rem);font-weight:900;color:#fff;
  margin-bottom:.6rem;line-height:1.3}
.landing-sub{font-size:.9rem;color:rgba(200,220,210,.65);margin-bottom:2.5rem;line-height:1.7}

.picker-wrap{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:380px}

.pcard{border-radius:20px;padding:1.4rem 1.25rem;cursor:pointer;
  display:flex;align-items:center;gap:1.1rem;border:2px solid transparent;
  transition:all .28s;touch-action:manipulation;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;
  background:rgba(255,255,255,.06)}
.pcard:active::before{opacity:1}

.pcard-gl3{background:linear-gradient(135deg,rgba(0,90,100,.35) 0%,rgba(0,60,80,.4) 100%);
  border-color:rgba(0,229,192,.3);}
.pcard-gl3:hover{border-color:#00E5C0;box-shadow:0 0 28px rgba(0,229,192,.3)}

.pcard-lrt{background:linear-gradient(135deg,rgba(90,20,30,.45) 0%,rgba(60,60,70,.35) 100%);
  border-color:rgba(192,57,43,.3);}
.pcard-lrt:hover{border-color:#C0392B;box-shadow:0 0 28px rgba(192,57,43,.3)}

/* pcard-ico replaced by pcard-logo-wrap */

.pcard-info{text-align:right;flex:1}
.pcard-name{font-size:1.05rem;font-weight:800;color:#fff;margin-bottom:.2rem}
.pcard-gl3 .pcard-name{color:#00E5C0}
.pcard-lrt .pcard-name{color:#E8A0A8}
.pcard-desc{font-size:.78rem;color:rgba(255,255,255,.5);line-height:1.5}

.pcard-arrow{font-size:1.2rem;color:rgba(255,255,255,.3);flex-shrink:0}

/* ═══════════ INTRO SCREEN ═══════════ */
.intro{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem 1.25rem;text-align:center;animation:fdi .8s ease}
/* iico replaced by ilogo-wrap */
.ititle{font-size:clamp(1.4rem,6vw,2.1rem);font-weight:900;
  background:linear-gradient(135deg,#fff 20%,var(--c2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.9rem;line-height:1.3}
.idesc{font-size:.93rem;color:rgba(200,230,220,.75);line-height:1.8;
  max-width:360px;margin:0 auto 1.75rem}
.istats{display:flex;gap:.75rem;margin-bottom:2.25rem;flex-wrap:wrap;justify-content:center}
.ipill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:.45rem 1rem;font-size:.82rem;color:var(--c2);
  display:flex;align-items:center;gap:.35rem;font-weight:600}
.bstart{width:100%;max-width:340px;padding:1rem;background:var(--grad);
  border:none;border-radius:16px;color:var(--txtdark);font-family:'Cairo',sans-serif;
  font-size:1.05rem;font-weight:800;cursor:pointer;
  box-shadow:0 8px 32px var(--glow);transition:all .25s;touch-action:manipulation}
.bstart:active{transform:scale(.97)}

/* ═══════════ BLOCKED / THANKS ═══════════ */
.blocked,.thanks{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:2rem 1.25rem;text-align:center;animation:fdi .7s ease}
.bico{font-size:3.5rem;margin-bottom:1.25rem;animation:flt 3s ease-in-out infinite}
.btitle{font-size:1.5rem;font-weight:900;color:var(--c2);margin-bottom:.7rem}
.ttitle{font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:.7rem}
.bsub,.tsub{color:rgba(200,230,220,.7);font-size:.92rem;line-height:1.8;max-width:320px}
.tico{width:90px;height:90px;background:var(--grad);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:2.8rem;
  margin:0 auto 1.75rem;box-shadow:0 0 60px var(--glow);animation:pls 2s ease-in-out infinite}
@keyframes pls{0%,100%{box-shadow:0 0 40px var(--glow)}50%{box-shadow:0 0 80px var(--glow)}}

/* ═══════════ HEADER ═══════════ */
.hdr{padding:1.1rem 1.25rem .4rem;text-align:center;flex-shrink:0}
.logo{display:inline-flex;align-items:center;gap:.85rem}
.lbadge{width:44px;height:44px;background:var(--grad);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:1.25rem;
  box-shadow:0 4px 16px var(--glow);border:1px solid rgba(255,255,255,.18);
  position:relative;overflow:hidden;flex-shrink:0}
.lbadge::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.18) 0%,transparent 55%)}
.ltxt .brand{font-size:.82rem;font-weight:700;color:var(--c2);letter-spacing:1px;display:block}
.ltxt .sub{font-size:.6rem;color:rgba(255,255,255,.5);display:block}

/* ═══════════ TRAIN-ON-RAILS PROGRESS ═══════════ */
.pcon{padding:.5rem 1.25rem .4rem;flex-shrink:0}
.train-track-wrap{position:relative;height:62px;direction:ltr;overflow:visible}

/* Sleeper cross-ties */
.slpr-row{position:absolute;bottom:13px;left:2px;right:2px;
  display:flex;justify-content:space-between;align-items:flex-end;z-index:0}
.slpr{width:2px;height:11px;border-radius:1px;opacity:.18}
.theme-gl3 .slpr{background:#A1D6CA}
.theme-lrt .slpr{background:#C0392B}

/* Rails */
.rail-a{position:absolute;left:0;right:0;height:3px;bottom:20px;border-radius:2px;z-index:1}
.rail-b{position:absolute;left:0;right:0;height:3px;bottom:14px;border-radius:2px;z-index:1}
.theme-gl3 .rail-a,.theme-gl3 .rail-b{background:rgba(0,171,142,.28)}
.theme-lrt .rail-a,.theme-lrt .rail-b{background:rgba(100,30,40,.35)}

/* Completed track — anchored to RIGHT, grows left as pct rises */
.track-done{position:absolute;right:0;bottom:14px;height:9px;border-radius:2px;
  transition:width .65s cubic-bezier(.34,1.56,.64,1);z-index:2;opacity:.88}
.theme-gl3 .track-done{background:linear-gradient(90deg,#00E5C0,#00AB8E,rgba(0,79,113,.3));animation:trackPulse 2s ease-in-out infinite}
.theme-lrt .track-done{background:linear-gradient(90deg,#C0392B,#8B1A2B,rgba(60,10,20,.3));animation:trackPulse 2s ease-in-out infinite}

/* Station dots along top rail */
.sdots{position:absolute;bottom:17px;left:2px;right:2px;
  display:flex;justify-content:space-between;z-index:3;pointer-events:none}
.sdot{width:9px;height:9px;border-radius:50%;border:2px solid;
  flex-shrink:0;transition:all .38s;background:rgba(8,15,22,.9)}
.theme-gl3 .sdot{border-color:rgba(0,171,142,.3)}
.theme-lrt .sdot{border-color:rgba(139,26,43,.3)}
.theme-gl3 .sdot.lit{background:#00E5C0;border-color:#00E5C0;
  box-shadow:0 0 8px 2px rgba(0,229,192,.8)}
.theme-lrt .sdot.lit{background:#C0392B;border-color:#C0392B;
  box-shadow:0 0 8px 2px rgba(192,57,43,.8)}

/* Train SVG wrapper — position via left (in LTR wrapper):
   pct=0 → left≈92% (far right visually in LTR = far right of page)
   pct=100 → left≈0%  (far left = destination) */
.train-wrap{position:absolute;bottom:16px;
  /* Smooth eased motion — feels like a real train decelerating into a station */
  transition:left 1.1s cubic-bezier(.4,0,.2,1);
  z-index:10;pointer-events:none;
  filter:drop-shadow(0 3px 10px rgba(0,0,0,.45))}
.train-img{height:42px;width:auto;display:block;
  /* Sub-pixel smooth rendering on all screens */
  image-rendering:-webkit-optimize-contrast;
  image-rendering:smooth;
  transform-origin:bottom center;
  /* Gentle vertical float to simulate track vibration */
  animation:trainFloat 2.4s ease-in-out infinite}
@keyframes trainFloat{
  0%,100%{transform:translateY(0px)}
  50%{transform:translateY(-1.5px)}}
@keyframes trackPulse{0%,100%{opacity:.9}50%{opacity:1}}

/* ═══════════ QUESTION CARD ═══════════ */
.qwrap{flex:1;padding:.7rem 1.25rem 0;animation:sli .32s ease}
@keyframes sli{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.qcard{background:var(--glass);backdrop-filter:blur(20px);
  border:1px solid var(--gb);border-radius:20px;padding:1.2rem;
  margin-bottom:1rem;position:relative;overflow:hidden;
  box-shadow:0 4px 28px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.06)}
.qcard::before{content:'';position:absolute;top:0;right:0;width:110px;height:110px;
  background:radial-gradient(circle,rgba(255,255,255,.04) 0%,transparent 70%);pointer-events:none}
.qtxt{font-size:clamp(.97rem,4.2vw,1.12rem);font-weight:700;line-height:1.6;
  color:#fff;margin-bottom:1.15rem}
.otag{display:inline-block;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);
  font-size:.6rem;padding:.1rem .45rem;border-radius:10px;margin-left:.4rem;font-weight:600}

/* ═══════════ OPTIONS ═══════════ */
.olist{display:flex;flex-direction:column;gap:.48rem}
.obtn{width:100%;background:rgba(255,255,255,.045);
  border:1.5px solid rgba(255,255,255,.1);color:#fff;border-radius:13px;
  padding:.8rem 1rem;font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:500;
  cursor:pointer;transition:border-color .2s,background .2s,box-shadow .2s;
  display:flex;align-items:center;gap:.7rem;touch-action:manipulation}
.obtn.sel{border-color:var(--c2);background:rgba(255,255,255,.08);
  box-shadow:0 0 14px var(--glow)}
.oind{width:22px;height:22px;min-width:22px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;
  justify-content:center;transition:all .2s;flex-shrink:0}
.obtn.sel .oind{background:var(--c2);border-color:var(--c2);box-shadow:0 0 8px var(--glow)}
.oind::after{content:'✓';font-size:.65rem;color:var(--txtdark,#000);opacity:0;transition:opacity .18s}
.obtn.sel .oind::after{opacity:1}
.olbl{flex:1;text-align:right}
.mind{width:22px;height:22px;min-width:22px;border-radius:6px;
  border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;
  justify-content:center;transition:all .2s;flex-shrink:0}
.obtn.sel .mind{background:var(--c2);border-color:var(--c2);box-shadow:0 0 8px var(--glow)}
.mind::after{content:'✓';font-size:.65rem;color:var(--txtdark,#000);opacity:0;transition:opacity .18s}
.obtn.sel .mind::after{opacity:1}
.mhint{font-size:.72rem;color:var(--c3);margin-bottom:.7rem;opacity:.85;
  display:flex;align-items:center;gap:.3rem}
.other-inp{width:100%;background:rgba(255,255,255,.07);
  border:1.5px solid var(--c2);border-radius:10px;color:#fff;
  font-family:'Cairo',sans-serif;font-size:.88rem;
  padding:.65rem .9rem;margin-top:.45rem;direction:rtl;transition:border-color .2s}
.other-inp:focus{outline:none;background:rgba(255,255,255,.1)}
.other-inp::placeholder{color:rgba(255,255,255,.3)}

/* ═══════════ SCALE ═══════════ */
.slbls{display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:.55rem;gap:.5rem}
.slbl-low,.slbl-high{font-size:.78rem;font-weight:700;line-height:1.3;
  max-width:38%;text-align:center;transition:color .2s}
.slbl-low{color:rgba(255,120,100,.85);text-align:right}
.slbl-high{color:rgba(100,220,180,.85);text-align:left}
.slbl-low.lit{color:#ff6b4a;text-shadow:0 0 10px rgba(255,107,74,.4)}
.slbl-high.lit{color:#00E5C0;text-shadow:0 0 10px rgba(0,229,192,.4)}
.sbtns{display:flex;gap:.3rem;justify-content:center}
.sbtn{flex:1;max-width:60px;aspect-ratio:1;border-radius:12px;
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.65);font-family:'Cairo',sans-serif;
  font-size:1.05rem;font-weight:700;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;touch-action:manipulation}
.sbtn:active{transform:scale(1.08)}
.sbtn.sel{background:var(--grad);border-color:transparent;color:var(--txtdark);
  transform:scale(1.1);box-shadow:0 4px 18px var(--glow)}
.semoji{display:flex;justify-content:space-between;margin-top:.45rem;padding:0 .1rem}

/* ═══════════ NPS ═══════════ */
.ngrid{display:flex;flex-direction:row;gap:.18rem;
  margin-bottom:.6rem;width:100%;justify-content:center}
.nbtn{flex:1;min-width:0;aspect-ratio:1;border-radius:8px;
  background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.1);color:rgba(255,255,255,.65);
  font-family:'Cairo',sans-serif;font-size:clamp(.62rem,2.8vw,.82rem);font-weight:700;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;
  justify-content:center;touch-action:manipulation;padding:0;
  max-width:calc((100% - 10 * .18rem) / 11)}
.nbtn.det{background:rgba(231,76,60,.3);border-color:#e74c3c;color:#fff;
  transform:scale(1.06);box-shadow:0 0 10px rgba(231,76,60,.35)}
.nbtn.pas{background:rgba(243,156,18,.3);border-color:#f39c12;color:#fff;
  transform:scale(1.06);box-shadow:0 0 10px rgba(243,156,18,.35)}
.nbtn.pro{background:rgba(46,204,113,.25);border-color:#27ae60;color:#fff;
  transform:scale(1.06);box-shadow:0 0 10px rgba(46,204,113,.35)}
.nlbls{display:flex;justify-content:space-between;font-size:.62rem;color:rgba(255,255,255,.38)}

/* ═══════════ MATRIX ═══════════ */
.mwrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.mtbl{width:100%;border-collapse:separate;border-spacing:0 .38rem;min-width:280px}
.mtbl th{color:var(--c3);font-size:.68rem;font-weight:600;padding:.35rem .4rem;text-align:center}
.mtbl th:first-child{text-align:right;min-width:90px}
.mrow td{background:rgba(255,255,255,.04);padding:.65rem .4rem;
  font-size:.82rem;text-align:center}
.mrow td:first-child{border-radius:0 10px 10px 0;padding-right:.75rem;
  color:rgba(255,255,255,.85);text-align:right}
.mrow td:last-child{border-radius:10px 0 0 10px}
.mrad{width:24px;height:24px;border-radius:50%;
  border:2px solid rgba(255,255,255,.22);background:transparent;
  cursor:pointer;display:inline-block;transition:all .2s;vertical-align:middle;
  touch-action:manipulation}
.mrad.sel{background:var(--c2);border-color:var(--c2);box-shadow:0 0 8px var(--glow)}

/* ═══════════ TEXTAREA ═══════════ */
.sta{width:100%;min-height:90px;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.1);border-radius:13px;color:#fff;
  font-family:'Cairo',sans-serif;font-size:.92rem;padding:.9rem;
  resize:vertical;transition:border-color .22s;direction:rtl;line-height:1.7}
.sta:focus{outline:none;border-color:var(--c2);background:rgba(255,255,255,.07)}
.sta::placeholder{color:rgba(255,255,255,.28)}

/* ═══════════ STATION PICKER ═══════════ */
.ssearch{width:100%;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(255,255,255,.12);border-radius:12px;
  color:#fff;font-family:'Cairo',sans-serif;font-size:.9rem;
  padding:.72rem 1rem;margin-bottom:.7rem;direction:rtl;touch-action:manipulation}
.ssearch:focus{outline:none;border-color:var(--c2)}
.ssearch::placeholder{color:rgba(255,255,255,.28)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:.42rem;
  max-height:240px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-left:2px}
.sgrid::-webkit-scrollbar{width:3px}
.sgrid::-webkit-scrollbar-track{background:rgba(255,255,255,.04);border-radius:2px}
.sgrid::-webkit-scrollbar-thumb{background:var(--c2);border-radius:2px}
.sitem{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);
  border-radius:10px;padding:.52rem .6rem;font-size:.78rem;cursor:pointer;
  transition:all .2s;text-align:center;color:rgba(255,255,255,.8);
  touch-action:manipulation;line-height:1.35}
.sitem:active{transform:scale(.97)}
.sitem.sel{border-color:var(--c2);background:rgba(255,255,255,.12);
  color:#fff;font-weight:600;box-shadow:0 0 10px var(--glow)}

/* ═══════════ NAV ═══════════ */
.nav{padding:.7rem 1.25rem 1.4rem;display:flex;flex-direction:column;gap:.55rem;flex-shrink:0}
.bnxt{width:100%;padding:1rem;background:var(--grad);border:none;
  border-radius:14px;color:var(--txtdark);font-family:'Cairo',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;transition:all .22s;
  box-shadow:0 4px 22px var(--glow);touch-action:manipulation}
.bnxt:active{transform:scale(.97)}
.bbck{width:100%;padding:.75rem;background:transparent;
  border:1.5px solid rgba(255,255,255,.12);border-radius:14px;
  color:rgba(255,255,255,.42);font-family:'Cairo',sans-serif;
  font-size:.88rem;cursor:pointer;transition:all .2s;touch-action:manipulation}
.bbck:active{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)}

/* ═══════════ MISC ═══════════ */
.emsg{color:#ff7675;font-size:.76rem;margin-top:.45rem;display:none;align-items:center;gap:.28rem}
.emsg.show{display:flex}
.ripple{position:fixed;inset:0;background:rgba(255,255,255,.05);z-index:500;
  pointer-events:none;animation:rip .4s ease forwards}
@keyframes rip{0%{opacity:1}100%{opacity:0}}
.sov{position:fixed;inset:0;background:rgba(10,10,20,.93);z-index:1000;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1rem;backdrop-filter:blur(12px)}
.spin{width:46px;height:46px;border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--c2);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.stxt{color:var(--c2);font-size:.9rem;font-weight:600}

/* ═══════════ RESPONSIVE ═══════════ */
@media(max-width:400px){
  /* nps flex layout handles all sizes */
  .qtxt{font-size:.95rem}
  .sbtns{gap:.22rem}
  .sbtn{max-width:52px;font-size:.95rem}
  .picker-wrap{gap:.85rem}
}
/* nps flex handles small screens too */

/* ═══════════ LANDING TEXT UPDATES ═══════════ */
.landing-rdmc{font-size:.75rem;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.35);
  margin-bottom:1rem;text-transform:uppercase}
.landing-tagline{font-size:clamp(1.4rem,6vw,2rem);font-weight:900;color:#fff;
  margin-bottom:.9rem;line-height:1.3;
  background:linear-gradient(135deg,#fff 30%,#00E5C0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.landing-body{font-size:.88rem;color:rgba(200,220,210,.7);line-height:1.85;
  max-width:360px;margin:0 auto 1.4rem}
.landing-divider{width:60px;height:2px;
  background:linear-gradient(90deg,#00AB8E,#C0392B);
  border-radius:2px;margin:0 auto 1.2rem}
.landing-choose{font-size:.9rem;color:rgba(255,255,255,.55);
  margin-bottom:1.2rem;line-height:1.6}

/* ═══════════ LOGO IN PICKER CARDS ═══════════ */
.pcard-logo-wrap{width:100%;border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:transparent;padding:0}
.pcard-logo-gl3{background:transparent;border-radius:12px}
.pcard-logo-lrt{background:transparent;border-radius:12px}
.pcard-logo-img{width:100%;height:auto;object-fit:contain;display:block;border-radius:8px}
.pcard-gl3-name{color:#00E5C0}
.pcard-lrt-name{color:#E8A0A8}

/* ═══════════ INTRO LOGO ═══════════ */
.ilogo-wrap{border-radius:16px;margin:0 auto 1.75rem;
  display:flex;align-items:center;justify-content:center;
  animation:flt 3s ease-in-out infinite;max-width:360px;width:100%;
  background:transparent;padding:0}
.intro-logo-gl3{box-shadow:0 12px 44px rgba(0,229,192,.35)}
.intro-logo-lrt{box-shadow:0 12px 44px rgba(192,57,43,.35)}
.ilogo-img{width:100%;max-height:58px;object-fit:contain;display:block}

/* ═══════════ HEADER LOGO IMG ═══════════ */
.lbadge-img{height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  background:transparent;padding:0}
.lbadge-gl3{box-shadow:0 2px 10px rgba(0,229,192,.25)}
.lbadge-lrt{box-shadow:0 2px 10px rgba(192,57,43,.25)}
.hdr-logo-img{height:28px;width:auto;object-fit:contain;display:block}

/* ═══════════ LOGO Q30 IMAGE ═══════════ */
.logo-q-wrap{display:flex;gap:.75rem;margin-bottom:1.1rem;flex-wrap:wrap;justify-content:center}
.logo-q-img{border-radius:14px;display:flex;align-items:center;justify-content:center;
  border:1.5px solid rgba(255,255,255,.15);overflow:hidden;
  background:transparent;padding:0}
.logo-q-img img{height:44px;width:auto;object-fit:contain;display:block;max-width:300px}

/* ══════════════════════════════════════════════
   METRO MINI-GAMES  — shared scaffolding
══════════════════════════════════════════════ */

/* ── Game intro transition screen ── */
.game-intro{display:flex;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:2rem 1.5rem;min-height:100vh;
  animation:gIntroIn .6s cubic-bezier(.22,1,.36,1)}
@keyframes gIntroIn{from{opacity:0;transform:scale(.93) translateY(22px)}to{opacity:1;transform:scale(1) translateY(0)}}
.gi-icon{font-size:4rem;margin-bottom:.8rem;animation:giBounce 1.9s ease-in-out infinite}
@keyframes giBounce{0%,100%{transform:translateY(0) scale(1)}45%{transform:translateY(-11px) scale(1.09)}65%{transform:translateY(-5px) scale(1.04)}}
.gi-tag{display:inline-flex;align-items:center;gap:.4rem;background:var(--grad);
  border-radius:20px;padding:.28rem .9rem;font-size:.68rem;font-weight:800;
  color:var(--txtdark);letter-spacing:.6px;margin-bottom:.85rem}
.gi-title{font-size:clamp(1.35rem,5.5vw,1.9rem);font-weight:900;line-height:1.2;
  margin-bottom:.55rem;
  background:linear-gradient(135deg,#fff 20%,var(--c2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gi-sub{font-size:.88rem;color:rgba(255,255,255,.6);line-height:1.8;
  max-width:300px;margin:0 auto 1.6rem}
.gi-countdown{font-size:3.8rem;font-weight:900;color:var(--c2);line-height:1;
  margin:-.3rem 0 .5rem;animation:giCt .9s ease-in-out infinite alternate}
@keyframes giCt{from{opacity:.4;transform:scale(.88)}to{opacity:1;transform:scale(1.12)}}
.gi-btn{width:100%;max-width:280px;padding:1rem;background:var(--grad);
  border:none;border-radius:16px;color:var(--txtdark);font-family:'Cairo',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;touch-action:manipulation;
  box-shadow:0 6px 28px var(--glow);transition:transform .18s;
  animation:giPulse 2.2s ease-in-out infinite}
@keyframes giPulse{0%,100%{box-shadow:0 6px 28px var(--glow)}
  50%{box-shadow:0 6px 44px var(--glow),0 0 0 8px rgba(var(--c2-rgb,0,229,192),.1)}}
.gi-btn:active{transform:scale(.96)}
.gi-skip{background:none;border:none;color:rgba(255,255,255,.28);
  font-family:'Cairo',sans-serif;font-size:.75rem;cursor:pointer;
  margin-top:.8rem;padding:.3rem;touch-action:manipulation;transition:color .2s}
.gi-skip:active{color:rgba(255,255,255,.6)}
.game-screen{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6.5rem 1.25rem 1.5rem;overflow-y:auto;
  background:var(--dark,#0A1A28);
  animation:gSlideIn .45s cubic-bezier(.22,1,.36,1)}
@keyframes gSlideIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

.game-header{position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.4rem 1.25rem .75rem;gap:.3rem;z-index:10;
  background:linear-gradient(to bottom,var(--dark,#0A1A28) 70%,transparent)}
/* game-logo moved to .game-logo-bar below game instructions */
.game-badge{background:var(--grad);border-radius:8px;padding:.2rem .55rem;
  font-size:.62rem;font-weight:800;color:var(--txtdark,#000);
  letter-spacing:.3px;white-space:nowrap}
.game-skip{
  background:rgba(255,255,255,.11);
  border:1.5px solid rgba(255,255,255,.35);
  border-radius:20px;
  padding:.38rem .85rem;
  font-size:.78rem;
  font-weight:700;
  color:rgba(255,255,255,.85);
  font-family:'Cairo',sans-serif;
  cursor:pointer;
  touch-action:manipulation;
  letter-spacing:.3px;
  transition:background .2s,border-color .2s,transform .15s,box-shadow .2s;
  box-shadow:0 2px 10px rgba(0,0,0,.25);
  display:flex;align-items:center;gap:.3rem;white-space:nowrap;flex-shrink:0}
.game-skip::before{content:none}
.game-skip::after{content:'⏮';font-size:.8rem}
.game-skip:hover{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.6);color:#fff}
.game-skip:active{transform:scale(.95);background:rgba(255,255,255,.25)}

.game-title{font-size:clamp(1rem,4vw,1.3rem);font-weight:900;text-align:center;
  background:linear-gradient(135deg,#fff 20%,var(--c2,#00E5C0) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:.2rem;line-height:1.25}
.game-sub{font-size:.76rem;color:rgba(255,255,255,.5);text-align:center;margin-bottom:.6rem}
.game-logo-bar{display:flex;justify-content:center;align-items:center;
  width:100%;margin-bottom:.8rem}
.game-logo-bar img{height:auto;width:70%;max-width:260px;min-width:160px;
  object-fit:contain;opacity:.95;display:block}

/* Score / Lives / Timer row */
.game-hud{display:flex;gap:.5rem;justify-content:center;margin-bottom:.7rem;flex-wrap:wrap}
.hud-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  border-radius:20px;padding:.35rem .85rem;font-size:.8rem;font-weight:700;
  display:flex;align-items:center;gap:.35rem;min-width:64px;justify-content:center}
.hud-pill.accent{background:rgba(var(--c2-rgb,0,229,192),.15);border-color:var(--c2,#00E5C0);color:var(--c2,#00E5C0)}

/* Result overlay */
.game-result{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(10,10,20,.88);backdrop-filter:blur(8px);
  border-radius:20px;padding:1.5rem;text-align:center;z-index:10;
  animation:gSlideIn .35s ease}
.res-emoji{font-size:3rem;margin-bottom:.6rem}
.res-title{font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:.4rem}
.res-sub{font-size:.85rem;color:rgba(255,255,255,.6);margin-bottom:1.2rem;line-height:1.6}
.res-score{font-size:2.2rem;font-weight:900;color:var(--c2,#00E5C0);margin-bottom:.3rem}
.res-score-lbl{font-size:.72rem;color:rgba(255,255,255,.4)}
.res-btn{padding:.9rem 2rem;background:var(--grad);border:none;border-radius:14px;
  color:var(--txtdark,#000);font-family:'Cairo',sans-serif;font-size:.95rem;font-weight:800;
  cursor:pointer;box-shadow:0 4px 20px var(--glow,rgba(0,229,192,.4));touch-action:manipulation}

/* ── GAME 1: Metro Tap — catch the falling coins ── */
#g1-canvas{display:block;border-radius:16px;border:1px solid var(--gb,rgba(0,229,192,.18));
  max-width:100%;touch-action:none}

/* ── GAME 2: Station Quiz ── */
.quiz-area{width:100%;max-width:420px}
.quiz-q{background:rgba(255,255,255,.06);border:1px solid var(--gb);border-radius:16px;
  padding:1.1rem;margin-bottom:.85rem;font-size:.95rem;font-weight:700;
  line-height:1.5;text-align:center;min-height:72px;display:flex;align-items:center;justify-content:center}
.quiz-opts{display:flex;flex-direction:column;gap:.5rem}
.quiz-opt{width:100%;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);
  border-radius:13px;padding:.8rem 1rem;font-family:'Cairo',sans-serif;font-size:.9rem;
  color:#fff;cursor:pointer;transition:all .2s;touch-action:manipulation;text-align:right}
.quiz-opt:active{transform:scale(.97)}
.quiz-opt.correct{background:rgba(46,213,115,.2);border-color:#2ed573;color:#2ed573}
.quiz-opt.wrong{background:rgba(255,71,87,.2);border-color:#ff4757;color:#ff4757}
.quiz-opt.reveal{background:rgba(46,213,115,.12);border-color:rgba(46,213,115,.5)}
.quiz-prog{display:flex;gap:.35rem;justify-content:center;margin-bottom:.85rem}
.qp-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .3s}
.qp-dot.done{background:var(--c2,#00E5C0)}
.qp-dot.cur{background:#fff;transform:scale(1.25)}

/* ── GAME 3: Speed Pairs — 4x4 timed memory match ── */
#g3-canvas{display:block;border-radius:16px;border:1px solid var(--gb);max-width:100%;touch-action:none}

/* ── GAME 4: Memory Match ── */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;max-width:380px;width:100%}
.mem-card{aspect-ratio:1;border-radius:14px;border:2px solid rgba(255,255,255,.1);
  cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s;
  touch-action:manipulation}
.mem-card.flipped{transform:rotateY(180deg)}
.mem-card.matched{border-color:var(--c2,#00E5C0);box-shadow:0 0 14px var(--glow)}
.mem-front,.mem-back{position:absolute;inset:0;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;font-size:1.6rem}
.mem-front{background:rgba(255,255,255,.05)}
.theme-gl3 .mem-front{background:linear-gradient(135deg,rgba(0,79,113,.4),rgba(0,171,142,.2))}
.theme-lrt .mem-front{background:linear-gradient(135deg,rgba(60,10,20,.5),rgba(139,26,43,.25))}
.mem-back{transform:rotateY(180deg);background:rgba(255,255,255,.1)}


/* ── CONTACT BAR ── */
.contact-bar{
  width:100%;max-width:380px;margin:1.6rem auto 0;
  padding:1rem .5rem .4rem;
  border-top:1px solid rgba(255,255,255,.1);
  text-align:center}
.contact-label{
  font-size:.65rem;color:rgba(255,255,255,.35);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:.7rem;font-weight:600}
.contact-icons{
  display:flex;gap:.55rem;justify-content:center;
  flex-wrap:wrap;align-items:center}
.cicon{
  display:flex;align-items:center;justify-content:center;
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  text-decoration:none;font-size:1.15rem;
  transition:background .2s,transform .15s;
  cursor:pointer}
.cicon:hover{background:rgba(255,255,255,.18);transform:scale(1.1)}
.cicon:active{transform:scale(.94)}
/* specific brand colours on hover */
.cicon-fb:hover{background:#1877F2}
.cicon-ig:hover{background:radial-gradient(circle at 30% 107%,#fdf497 0%,#fd5949 45%,#d6249f 60%,#285AEB 90%)}
.cicon-tk:hover{background:#010101}
.cicon-li:hover{background:#0A66C2}
.cicon-wa:hover{background:#25D366}
.cicon-wa-wrap{position:relative;display:inline-flex}
.wa-popup{
  position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);
  background:#1a1a2e;border:1px solid rgba(37,211,102,.35);border-radius:14px;
  padding:.55rem .6rem;display:flex;gap:.45rem;white-space:nowrap;
  box-shadow:0 6px 24px rgba(0,0,0,.55);z-index:999;
  opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;
  transform:translateX(-50%) translateY(6px)}
.wa-popup.open{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
.wa-popup::after{content:'';position:absolute;top:100%;left:50%;
  transform:translateX(-50%);border:6px solid transparent;
  border-top-color:#1a1a2e}
.wa-pill{display:flex;align-items:center;gap:.32rem;
  padding:.38rem .72rem;border-radius:20px;border:1px solid rgba(37,211,102,.3);
  background:rgba(37,211,102,.1);color:#fff;font-family:'Cairo',sans-serif;
  font-size:.75rem;font-weight:700;text-decoration:none;cursor:pointer;
  transition:background .18s,border-color .18s}
.wa-pill:hover{background:#25D366;border-color:#25D366;color:#000}
.wa-pill svg{flex-shrink:0}
.cicon-ph:hover{background:#34A853}
.cicon-em:hover{background:#EA4335}
</style>
</head>

// DUPLICATE GUARD — monthly reset
// Key format: rdmc_gl3_YYYY_MM  /  rdmc_lrt_YYYY_MM
// Each calendar month a fresh key is used → respondent can
// participate once per month per survey, not blocked forever.
// ════════════════════════════════════════════════════════════
function monthKey(mode){
  const d=new Date();
  const ym=d.getFullYear()+'_'+(d.getMonth()+1).toString().padStart(2,'0');
  return 'rdmc_'+(mode==='gl3'?'gl3':'lrt')+'_v3_'+ym;
}
function isSubmitted(mode){
  try{return localStorage.getItem(monthKey(mode))==='1';}catch(e){return false;}
}
function markDone(mode){
  try{localStorage.setItem(monthKey(mode),'1');}catch(e){}
  // Clean up old keys from previous months to keep storage tidy
  try{
    const cur=monthKey(mode);
    Object.keys(localStorage).filter(k=>k.startsWith('rdmc_')&&k!==cur)
      .forEach(k=>localStorage.removeItem(k));
  }catch(e){}
}

// Browser fingerprint — includes YYYY_MM so server can also enforce monthly window
function fingerprint(){
  const n=navigator;
  const d=new Date();
  const ym=d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0');
  return btoa([n.language,n.platform,screen.width,screen.height,
    n.hardwareConcurrency,Intl.DateTimeFormat().resolvedOptions().timeZone,ym].join('|')).slice(0,32);
}
// Expose current month label for the sheet (e.g. "2026-05")
function surveyMonth(){
  const d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
}

// PROGRESS PERSISTENCE  — survives page refresh
// Saves to sessionStorage (tab-scoped, clears when tab closes).
// Key: rdmc_progress_<mode>
// ════════════════════════════════════════════════════════════
const PROG_KEY_GL3 = 'rdmc_prog_gl3';
const PROG_KEY_LRT = 'rdmc_prog_lrt';

function saveProgress(){
  if(!MODE) return;
  try{
    const key = MODE==='gl3' ? PROG_KEY_GL3 : PROG_KEY_LRT;
    const data = {
      mode: MODE,
      idx: idx,
      ans: ans,
      ansOther: ansOther,
      surveyStartTime: surveyStartTime,
      shownGames: shownGames,
      ts: Date.now()
    };
    sessionStorage.setItem(key, JSON.stringify(data));
  }catch(e){}
}

function loadProgress(mode){
  try{
    const key = mode==='gl3' ? PROG_KEY_GL3 : PROG_KEY_LRT;
    const raw = sessionStorage.getItem(key);
    if(!raw) return null;
    const data = JSON.parse(raw);
    // Discard if older than 2 hours (stale session)
    if(Date.now() - data.ts > 2 * 60 * 60 * 1000){
      sessionStorage.removeItem(key);
      return null;
    }
    return data;
  }catch(e){ return null; }
}

function clearProgress(mode){
  try{
    const key = mode==='gl3' ? PROG_KEY_GL3 : PROG_KEY_LRT;
    sessionStorage.removeItem(key);
  }catch(e){}
}

function applyTheme(mode){
  document.body.className = mode === 'lrt' ? 'theme-lrt' : 'theme-gl3';
  const colors = mode === 'lrt'
    ? ['#C0392B','#E8A0A8','#9E9E9E','#8B1A2B']
    : ['#00E5C0','#5DDFFF','#7EECD8','#48A9C5'];
  ['pt1','pt2','pt3','pt4'].forEach((id,i)=>{
    const el=document.getElementById(id);
    el.style.background=colors[i%colors.length];
    el.style.left=(8+i*18)+'%';
    el.style.animationDelay=(i*.9)+'s';
    el.style.animationDuration=(6+i)+'s';
  });
}

let QS=[], ans={}, ansOther={}, idx=0, vq=[], sending=false;
let SESSION_ID = null;

let STA_LIST=[], STA_EN_MAP={};

function initSurvey(mode){
  shownGames={};
  MODE = mode;
  surveyCompleted = false;
  QS = buildQuestions(mode);
  ans={}; ansOther={}; idx=0; vq=[];
  STA_LIST = (mode==='gl3' ? GL3_STA : LRT_STA).map(s=>s.ar);
  STA_EN_MAP = Object.fromEntries((mode==='gl3' ? GL3_STA : LRT_STA).map(s=>[s.ar,s.en]));
  applyTheme(mode);
}

function getVQ(){return QS.filter(q=>!q.showIf||q.showIf(ans))}

function isAns(q){
  if(!q.req&&q.opt)return true;
  const a=ans[q.id];
  // If "Other (please specify)" is selected, the text box must not be empty
  const otherSelected = (
    (typeof a==='string' && a===OTHER_OPT) ||
    (Array.isArray(a) && a.includes(OTHER_OPT))
  );
  if(otherSelected && !(ansOther[q.id]||'').trim()) return false;
  if(q.type==='multi'||q.type==='multi3')return Array.isArray(a)&&a.length>0;
  if(q.type==='matrix')return typeof a==='object'&&a!==null&&Object.keys(a).length===q.rows.length;
  if(q.type==='text'||q.type==='shorttext')return typeof a==='string'&&a.trim().length>0;
  return a!==null&&a!==undefined;
}

function checkGame(fromQ, cb){

function showGameIntro(level, onStart, onSkip){

      +'<div class="gi-countdown">'+ct+'</div>'

      +'<button class="gi-skip" onclick="giSkip()">تخطي اللعبة ⏮</button>'
    +'</div>';

    window.giSkip=function(){clearInterval(timer);onSkip();};
  }

    countdown--;

    var ct=document.querySelector('.gi-countdown');

  },1000);
}

function launchGame(level, onDone){
  const el = document.createElement('div');
  el.className = 'game-screen';
  el.id = 'game-overlay';
  document.body.appendChild(el);

  const fns = [null, launchQuiz, launchCoinTap, launchDash, launchMemory];

  function startGame(){
    fns[level](el, (score)=>{
      gameScores['l'+level] = score;
      gameScores.total += score;
      if(el.parentNode) el.parentNode.removeChild(el);
      onDone();
    });
  }

  function skipGame(){
    if(el.parentNode) el.parentNode.removeChild(el);
    onDone();
  }

  showGameIntro(level, startGame, skipGame);
}

// LEVEL 1 — SEQUENCE MEMORY  (Simon-style)
// Watch flashing metro icons, then tap them back in order
// ══════════════════════════════════════════════════════════════
function launchCoinTap(el, done){
  var ICONS=['🚇','🎫','🪙','🗺️','⭐','🔔'];
  var sequence=[], playerSeq=[], round=0, score=0, showing=false, accepting=false, usedSecondChance=false;
  var MAX_ROUNDS=6;

  function makeBoard(highlight){
    var rows='';
    for(var i=0;i<ICONS.length;i++){
      var lit=(i===highlight);
      var bg=lit?'rgba(255,255,255,.22)':'rgba(255,255,255,.06)';
      var bd=lit?'var(--c2)':'rgba(255,255,255,.12)';
      var sh=lit?'0 0 22px var(--glow)':'none';
      var sc=lit?'scale(1.12)':'scale(1)';
      rows+='<div onclick="seqTap('+i+')" data-si="'+i+'" style="aspect-ratio:1;border-radius:16px;background:'+bg+';border:2.5px solid '+bd+';display:flex;align-items:center;justify-content:center;font-size:2rem;cursor:pointer;transition:all .25s;box-shadow:'+sh+';transform:'+sc+'">'+ICONS[i]+'</div>';
    }
    return rows;
  }

  function renderBoard(highlight){
    var msg=showing?'راقب التسلسل...':'اضغط على الأيقونات بنفس الترتيب';
    var statusTxt=showing?'راقب التسلسل...':'الآن كرّر ما رأيته!';
    el.innerHTML='<div class="game-header"><div class="game-badge">🎮 مستوى 2 / 4</div>'+'<button class="game-skip" onclick="seqDone()">تخطي ◀</button></div>'
      +'<div class="game-logo-bar"><img src="'+(MODE==='gl3'?GL3_LOGO:LRT_LOGO)+'" alt="logo"></div>'
      +'<div class="game-title">تذكّر التسلسل! 🔢</div>'
      +'<div class="game-sub">'+statusTxt+'</div>'
      +'<div class="game-hud"><div class="hud-pill accent">جولة '+(round)+' / '+MAX_ROUNDS+'</div><div class="hud-pill">⭐ '+score+' نقطة</div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;max-width:280px;width:100%;margin:.5rem auto 1rem">'
      +makeBoard(highlight)
      +'</div>'
      +'<div id="seq-msg" style="font-size:.82rem;color:rgba(255,255,255,.4);text-align:center;min-height:20px">'+msg+'</div>';

    window.seqTap=function(i){
      if(!accepting||showing)return;
      playerSeq.push(i);
      var card=document.querySelector('[data-si="'+i+'"]');
      if(card){card.style.background='rgba(255,255,255,.28)';card.style.transform='scale(1.1)';setTimeout(function(){card.style.background='rgba(255,255,255,.06)';card.style.transform='scale(1)';},250);}
      var pos=playerSeq.length-1;
      if(playerSeq[pos]!==sequence[pos]){
        accepting=false;
        var msg2=document.getElementById('seq-msg');
        // First round wrong → second chance; any later round → game over
        if(round===1 && !usedSecondChance){
          usedSecondChance=true;
          if(msg2){msg2.textContent='💛 حاول مرة ثانية! تذكّر التسلسل...';msg2.style.color='#D4A017';}
          setTimeout(function(){
            playerSeq=[];
            flashSeq(0,function(){showing=false;accepting=true;renderBoard(-1);});
          },900);
        } else {
          if(msg2){msg2.textContent='❌ غلط!';msg2.style.color='#ff4757';}
          setTimeout(function(){seqDone();},1200);
        }
      } else if(playerSeq.length===sequence.length){
        accepting=false; score+=round;
        var msg3=document.getElementById('seq-msg');
        if(msg3){msg3.textContent='✅ ممتاز! +'+round;msg3.style.color='#2ed573';}
        if(round<MAX_ROUNDS){setTimeout(function(){playerSeq=[];nextRound();},900);}
        else{setTimeout(function(){seqDone();},900);}
      }
    };
    window.seqDone=function(){
      accepting=false;showing=false;
      var msg4=score>=15?'ذاكرة خارقة! 🏆':score>=8?'أداء ممتاز! ⭐':score>=3?'جيد، واصل! 💪':'تدرّب أكثر 😄';
      showResult(el,score,msg4,'تذكّرت تسلسلات متزايدة الصعوبة',done);
    };
  }

  function flashSeq(idx,cb){
    if(idx>=sequence.length){setTimeout(cb,400);return;}
    showing=true;accepting=false;
    renderBoard(sequence[idx]);
    setTimeout(function(){
      renderBoard(-1);
      setTimeout(function(){flashSeq(idx+1,cb);},350);
    },750);
  }

  function nextRound(){
    round++;
    sequence.push(Math.floor(Math.random()*ICONS.length));
    renderBoard(-1);
    setTimeout(function(){
      flashSeq(0,function(){showing=false;accepting=true;renderBoard(-1);});
    },800);
  }

  nextRound();
}

// LEVEL 2 — SHELL GAME  (follow the golden ticket)
// Show ticket under one train, shuffle 3 trains at varying speeds,
// player taps the train hiding the ticket.
// ══════════════════════════════════════════════════════════════
function launchQuiz(el, done){
  var ROUNDS=3, round=0, score=0;
  var trainPos=[0,1,2];   // trainPos[i] = column index of train i
  var ticketTrain=0;      // which train (0-2) holds the ticket
  var gamePhase='idle';
  var locked=true;

  var containerW=Math.min(300, window.innerWidth-48);
  var trainW=72, colW=Math.floor(containerW/3);
  var posX=[
    Math.floor(colW/2-trainW/2),
    Math.floor(colW+colW/2-trainW/2),
    Math.floor(2*colW+colW/2-trainW/2)
  ];

  function getX(trainIdx){ return posX[trainPos[trainIdx]]; }

  function makeHeader(){
    return '<div class="game-header">'
      +'<div class="game-badge">🎮 مستوى 2 / 4</div>'
      +'<button class="game-skip" onclick="shellSkip()">تخطي ◀</button>'
      +'</div>';
  }

  // Ticket: yellow card with black magnetic stripe
  function ticketHTML(leftPx){
    return '<div id="sh-ticket" style="position:absolute;bottom:18px;left:'+leftPx+'px;'
      +'width:'+trainW+'px;display:flex;justify-content:center;align-items:center;'
      +'opacity:0;transition:opacity .25s;pointer-events:none;z-index:1">'
      +'<div style="width:58px;height:28px;background:linear-gradient(135deg,#FFE033,#F5C400);'
        +'border-radius:5px;border:2px solid #B8860B;position:relative;'
        +'box-shadow:0 3px 12px rgba(0,0,0,.55)">'
        +'<div style="position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);'
          +'height:7px;background:#111;border-radius:1px"></div>'
        +'<div style="position:absolute;left:5px;top:4px;font-size:.45rem;color:#B8860B;'
          +'font-weight:800;letter-spacing:.5px">METRO</div>'
      +'</div>'
    +'</div>';
  }

  function buildUI(){
    var trains='';
    for(var i=0;i<3;i++){
      trains+='<div id="sh-t'+i+'" onclick="shellGuess('+i+')"'
        +' style="position:absolute;bottom:0;left:'+getX(i)+'px;width:'+trainW+'px;height:'+trainW+'px;'
        +'display:flex;align-items:center;justify-content:center;font-size:2.8rem;'
        +'cursor:pointer;transition:left .5s ease,bottom .25s ease,opacity .3s;'
        +'z-index:2;touch-action:manipulation;user-select:none">🚆</div>';
    }
    el.innerHTML=makeHeader()
      +'<div class="game-logo-bar"><img src="'+(MODE==='gl3'?GL3_LOGO:LRT_LOGO)+'" alt="logo"></div>'
      +'<div class="game-title">ركّز على التذكرة! 🎫</div>'
      +'<div class="game-sub">تابع أين تختبئ التذكرة الذهبية تحت القطارات</div>'
      +'<div class="game-hud">'
        +'<div class="hud-pill accent" id="sh-score">⭐ 0 / '+ROUNDS+'</div>'
        +'<div class="hud-pill" id="sh-msg">استعد...</div>'
      +'</div>'
      +'<div id="sh-arena" style="position:relative;height:160px;width:'+containerW+'px;margin:.3rem auto">'
        +ticketHTML(posX[ticketTrain])
        +trains
      +'</div>'
      +'<div id="sh-res" style="text-align:center;min-height:28px;font-size:.88rem;'
        +'font-weight:700;margin-top:.3rem"></div>';

    window.shellSkip=function(){locked=true;endShell();};
    window.shellGuess=function(i){if(!locked&&gamePhase==='guess')handleGuess(i);};
  }

  function T(i){return document.getElementById('sh-t'+i);}
  function TK(){return document.getElementById('sh-ticket');}
  function setMsg(t){var m=document.getElementById('sh-msg');if(m)m.textContent=t;}
  function setRes(t,c){var r=document.getElementById('sh-res');if(r){r.textContent=t;r.style.color=c||'#fff';}}
  function setScore(){var s=document.getElementById('sh-score');if(s)s.textContent='⭐ '+score+' / '+ROUNDS;}

  function revealTicket(cb){
    gamePhase='reveal';
    setMsg('التذكرة هنا! 👀');
    // Position ticket under the correct train's current column
    var tk=TK(), tr=T(ticketTrain);
    if(tk){tk.style.left=posX[trainPos[ticketTrain]]+'px';tk.style.opacity='1';}
    if(tr) tr.style.bottom='60px';
    setTimeout(function(){
      if(tr) tr.style.bottom='0px';
      setTimeout(function(){
        if(tk) tk.style.opacity='0';
        setTimeout(cb,250);
      },450);
    },1300);
  }

  function doSwap(a,b,dur,cb){
    var xa=getX(a), xb=getX(b);
    var ta=T(a), tb=T(b);
    var tmp=trainPos[a]; trainPos[a]=trainPos[b]; trainPos[b]=tmp;
    if(ta){ta.style.transition='left '+dur+'ms cubic-bezier(.4,0,.2,1)';ta.style.left=xb+'px';}
    if(tb){tb.style.transition='left '+dur+'ms cubic-bezier(.4,0,.2,1)';tb.style.left=xa+'px';}
    // Add arc: mid-swap vertical bounce
    setTimeout(function(){if(ta)ta.style.bottom='12px';if(tb)tb.style.bottom='12px';},dur/3);
    setTimeout(function(){if(ta)ta.style.bottom='0px';if(tb)tb.style.bottom='0px';},dur*0.75);
    setTimeout(cb,dur+60);
  }

  function shuffle(n,cb){
    gamePhase='shuffle';
    setMsg('ركّز! 🔄');
    var durations=[900,820,740];
    var spd=durations[Math.min(round-1,durations.length-1)];
    var swaps=[];
    var prev=-1;
    for(var s=0;s<n;s++){
      var a,b;
      do{a=Math.floor(Math.random()*3);}while(a===prev);
      do{b=Math.floor(Math.random()*3);}while(b===a);
      // Vary speed: some swaps faster, some slower
      var thisDur=Math.max(180, spd+Math.floor((Math.random()-.5)*140));
      swaps.push([a,b,thisDur]);
      prev=b;
    }
    function next(idx){
      if(idx>=swaps.length){setTimeout(cb,150);return;}
      doSwap(swaps[idx][0],swaps[idx][1],swaps[idx][2],function(){next(idx+1);});
    }
    next(0);
  }

  function handleGuess(trainIdx){
    locked=true; gamePhase='result';
    var correct=(trainIdx===ticketTrain);
    // Reveal ticket at correct position
    var tk=TK(), tr=T(ticketTrain);
    if(tk){tk.style.left=posX[trainPos[ticketTrain]]+'px';tk.style.opacity='1';}
    if(tr) tr.style.bottom='55px';
    if(!correct){var wrong=T(trainIdx);if(wrong)wrong.style.opacity='.3';}
    if(correct){score++;setScore();setRes('✅ وجدتها! +1 ⭐','#2ed573');}
    else{setRes('❌ خطأ! كانت هنا →','#ff4757');}
    setTimeout(function(){
      if(tr) tr.style.bottom='0px';
      setTimeout(function(){
        if(tk) tk.style.opacity='0';
        setTimeout(function(){
          if(round>=ROUNDS){endShell();}else{nextRound();}
        },300);
      },500);
    },1100);
  }

  function nextRound(){
    round++;
    locked=true; gamePhase='idle';
    // Reset all trains to starting columns
    trainPos=[0,1,2];
    ticketTrain=Math.floor(Math.random()*3);
    for(var i=0;i<3;i++){
      var t=T(i);
      if(t){t.style.transition='none';t.style.left=posX[i]+'px';
        t.style.bottom='0px';t.style.opacity='1';}
    }
    var tk=TK();
    if(tk){tk.style.transition='none';tk.style.left=posX[ticketTrain]+'px';tk.style.opacity='0';}
    setRes('');
    setTimeout(function(){
      var numSwaps=3+round;
      revealTicket(function(){
        shuffle(numSwaps,function(){
          gamePhase='guess'; locked=false;
          setMsg('أين التذكرة؟! ');
        });
      });
    },120);
  }

  function endShell(){
    var msg=score>=3?'عيون نسر! 🦅':score>=2?'ليس سيئاً! 👍':'تدرّب أكثر! 😄';
    showResult(el,score,msg,'أصبت '+score+' من '+ROUNDS+' جولات',done);
  }

  buildUI();
  nextRound();
}

// LEVEL 3 — SPEED PAIRS  (4×4 timed memory match)
// Classic flip-and-match against a 60-second countdown
// ══════════════════════════════════════════════════════════════
function launchDash(el, done){
  var ICONS=['🚇','🎫','🪙','🗺️','⭐','🔔','🚉','🏅'];
  var cards=[].concat(ICONS,ICONS).sort(function(){return Math.random()-.5;});
  var state=cards.map(function(e){return {emoji:e,revealed:false,matched:false};});
  var flipped=[],matched=0,moves=0,locked=false,timeLeft=60,ticker=null;

  function startTimer(){
    ticker=setInterval(function(){
      timeLeft--;
      var t=document.getElementById('sp-timer');
      if(t){t.textContent='⏱ '+timeLeft;if(timeLeft<=10)t.style.color='#ff4757';}
      if(timeLeft<=0){clearInterval(ticker);endGame(false);}
    },1000);
  }

  function render(){
    var cells='';
    for(var i=0;i<state.length;i++){
      var c=state[i];
      var cls='mem-card'+(c.revealed||c.matched?' flipped':'')+(c.matched?' matched':'');
      cells+='<div class="'+cls+'" style="height:68px" onclick="spFlip('+i+')" data-spi="'+i+'">'
        +'<div class="mem-front" style="font-size:.7rem;color:rgba(255,255,255,.25)">?</div>'
        +'<div class="mem-back" style="font-size:1.7rem">'+c.emoji+'</div>'
        +'</div>';
    }
    el.innerHTML='<div class="game-header"><div class="game-badge">🎮 مستوى 3 / 4</div>'+'<button class="game-skip" onclick="spDone()">تخطي ◀</button></div>'
      +'<div class="game-logo-bar"><img src="'+(MODE==='gl3'?GL3_LOGO:LRT_LOGO)+'" alt="logo"></div>'
      +'<div class="game-title">سباق الأزواج! ⚡</div>'
      +'<div class="game-sub">اعثر على كل الأزواج قبل نفاد الوقت!</div>'
      +'<div class="game-hud"><div class="hud-pill accent">✅ '+matched+'/'+ICONS.length+'</div><div class="hud-pill" id="sp-timer">⏱ '+timeLeft+'</div><div class="hud-pill">🔄 '+moves+'</div></div>'
      +'<div class="mem-grid" style="grid-template-columns:repeat(4,1fr);max-width:320px;gap:.42rem">'+cells+'</div>';

    window.spDone=function(){clearInterval(ticker);endGame(false);};
    window.spFlip=function(i){
      if(locked||state[i].matched||state[i].revealed)return;
      state[i].revealed=true; flipped.push(i);
      var card=document.querySelector('[data-spi="'+i+'"]');
      if(card)card.classList.add('flipped');
      if(flipped.length===2){
        locked=true; moves++;
        var a=flipped[0],b=flipped[1];
        if(state[a].emoji===state[b].emoji){
          setTimeout(function(){
            state[a].matched=state[b].matched=true;
            matched++; flipped=[]; locked=false; render();
            if(matched===ICONS.length){clearInterval(ticker);endGame(true);}
          },350);
        } else {
          setTimeout(function(){
            state[a].revealed=state[b].revealed=false;
            flipped=[]; locked=false; render();
          },1200);
        }
      }
    };
  }

  function endGame(completed){
    clearInterval(ticker);
    var bonus=completed?Math.max(0,timeLeft):0;
    var total=matched+bonus;
    var msg=completed?'إتمام كامل! 🏆':matched>=6?'قريب جداً! ⭐':matched>=3?'أداء جيد! 💪':'تدرّب أكثر 😄';
    var sub=completed?'أكملت في '+(60-timeLeft)+'ث بـ'+moves+' حركة + مكافأة وقت '+bonus+' نقطة':'وجدت '+matched+' أزواج من أصل '+ICONS.length+' قبل انتهاء الوقت';
    showResult(el,total,msg,sub,done);
  }

  render();
  startTimer();
}

// ══════════════════════════════════════════════════════════════
// LEVEL 4 — MEMORY MATCH  3×3  (4 pairs + 1 wildcard ⭐)
// ══════════════════════════════════════════════════════════════
function launchMemory(el, done){
  const PAIRS=['🚇','🎫','🪙','🗺️'];
  const WILD='⭐';
  const cards=[...PAIRS,...PAIRS,WILD].sort(()=>Math.random()-.5);
  let flipped=[],matchedPairs=0,moves=0,locked=false,wildGot=false;
  const state=cards.map(e=>({emoji:e,revealed:false,matched:false}));

  function render(){
    el.innerHTML=`
      <div class="game-header">
        <div class="game-badge">🎮 مستوى 4 / 4</div>
        <button class="game-skip" onclick="memDone()">تخطي ◀</button>
      </div>
      <div class="game-logo-bar"><img src="${MODE==='gl3'?GL3_LOGO:LRT_LOGO}" alt="logo"></div>
      <div class="game-title">لعبة الذاكرة 🧠</div>
      <div class="game-sub">اعثر على الأزواج — النجمة ⭐ مكافأة مجانية!</div>
      <div class="game-hud">
        <div class="hud-pill accent">✅ ${matchedPairs}/${PAIRS.length}</div>
        <div class="hud-pill">🔄 ${moves} حركة</div>
      </div>
      <div class="mem-grid" style="grid-template-columns:repeat(3,1fr);max-width:290px;gap:.55rem">
        ${state.map((c,i)=>`
          <div class="mem-card${c.revealed||c.matched?' flipped':''}${c.matched?' matched':''}"
               style="height:80px" onclick="memFlip(${i})" data-i="${i}">
            <div class="mem-front"></div>
            <div class="mem-back" style="font-size:2rem">${c.emoji}</div>
          </div>`).join('')}
      </div>`;

    window.memFlip=function(i){
      if(locked||state[i].matched||state[i].revealed)return;
      state[i].revealed=true; flipped.push(i);
      const card=document.querySelector('[data-i="'+i+'"]');
      if(card)card.classList.add('flipped');

      // Wildcard — instant free match
      if(state[i].emoji===WILD){
        setTimeout(()=>{state[i].matched=true;wildGot=true;flipped=flipped.filter(x=>x!==i);render();},500);
        return;
      }

      if(flipped.length===2){
        locked=true; moves++;
        const [a,b]=flipped;
        if(state[a].emoji===state[b].emoji){
          setTimeout(()=>{
            state[a].matched=state[b].matched=true;
            matchedPairs++; flipped=[]; locked=false; render();
            if(matchedPairs===PAIRS.length){
              setTimeout(()=>{
                const bonus=Math.max(0,10-moves)+(wildGot?3:0);
                showResult(el,PAIRS.length+bonus,'برافو! 🏆',
                  'أكملت في '+moves+' حركات'+(wildGot?' وأمسكت النجمة ⭐!':'!'),done);
              },500);
            }
          },400);
        } else {
          setTimeout(()=>{
            state[a].revealed=state[b].revealed=false;
            flipped=[]; locked=false; render();
          },1400);
        }
      }
    };
    window.memDone=function(){
      showResult(el,matchedPairs,matchedPairs>=PAIRS.length?'أحسنت! 👍':'يمكنك التحسين 💪',
        'عثرت على '+matchedPairs+' أزواج',done);
    };
  }
  render();
}
// ══════════════════════════════════════════════════════════════
// SHARED: RESULT SCREEN
// ══════════════════════════════════════════════════════════════
function showResult(container, score, title, sub, onDone){
  const stars = score>=12?'⭐⭐⭐':score>=6?'⭐⭐':'⭐';
  const res=document.createElement('div');
  res.className='game-result';
  res.innerHTML=`
    <div class="res-emoji">${score>=10?'🏆':score>=5?'🎉':'💪'}</div>
    <div class="res-title">${title}</div>
    <p class="res-sub">${sub}</p>
    <div class="res-score">${stars}</div>
    <div class="res-score-lbl">نقاطك: ${score} • المجموع الكلي: ${gameScores.total+score}</div>
    <br>
    <button class="res-btn" onclick="this.parentNode.remove();(arguments[0])(${score})">
      متابعة الاستطلاع ←
    </button>`;
  // Pass done callback safely
  res.querySelector('.res-btn').onclick=()=>{ res.remove(); onDone(score); };
  container.appendChild(res);
}

function flash(cb){
  const r=document.createElement('div');r.className='ripple';
  document.body.appendChild(r);
  setTimeout(()=>{if(r.parentNode)r.parentNode.removeChild(r);cb();},360);
}
function advance(){
  const curQ=vq[idx];
  vq=getVQ();
  if(idx>=vq.length-1){
    checkGame(curQ,()=>submitSurvey());
  } else {
    idx++;if(idx>=vq.length)idx=vq.length-1;
    const nxtQ=vq[idx];
    checkGame(curQ,()=>{renderQ(nxtQ);window.scrollTo({top:0,behavior:'smooth'});});
  }
}
function goNext(id){
  const q=vq[idx];
  if(!isAns(q)){
    const e=document.getElementById('em'+id);if(e)e.classList.add('show');
    // If "other" is selected but box is empty, highlight it specifically
    const a=ans[q.id];
    const otherSel=(typeof a==='string'&&a===OTHER_OPT)||(Array.isArray(a)&&a.includes(OTHER_OPT));
    if(otherSel&&!(ansOther[q.id]||'').trim()){
      const inp=document.getElementById('otherInp'+q.id);
      const err=document.getElementById('otherErr'+q.id);
      if(inp){inp.style.borderColor='#e74c3c';inp.focus();}
      if(err)err.style.display='block';
    }
    return;
  }
  // Clear any other-box error styling before advancing
  const inp=document.getElementById('otherInp'+q.id);
  const err=document.getElementById('otherErr'+q.id);
  if(inp)inp.style.borderColor='';
  if(err)err.style.display='none';
  advance();
}
function goPrev(){if(idx>0){idx--;renderQ(vq[idx]);window.scrollTo({top:0,behavior:'smooth'});}}
function goSkip(){advance();}

// ════════════════════════════════════════════════════════════
// INTERACTION HANDLERS
// ════════════════════════════════════════════════════════════
function selOpt(id,v,type){
  if(type==='single'){ans[id]=v;vq=getVQ();saveProgress();renderQ(vq[idx]);}
  else if(type==='multi'){
    if(!ans[id])ans[id]=[];
    const i=ans[id].indexOf(v);i>-1?ans[id].splice(i,1):ans[id].push(v);
    renderQ(vq[idx]);
  }else if(type==='multi3'){
    if(!ans[id])ans[id]=[];
    const i=ans[id].indexOf(v);
    if(i>-1)ans[id].splice(i,1);
    else if(ans[id].length<3)ans[id].push(v);
    else return;
    renderQ(vq[idx]);
  }
}
function setOther(id,v){
  ansOther[id]=v;
  saveProgress();
  // Clear error highlight as soon as user types something
  if(v.trim()){
    const inp=document.getElementById('otherInp'+id);
    const err=document.getElementById('otherErr'+id);
    if(inp)inp.style.borderColor='';
    if(err)err.style.display='none';
  }
}
function setScale(id,v){ans[id]=v;saveProgress();renderQ(vq[idx]);}
function setNPS(id,v){ans[id]=v;saveProgress();renderQ(vq[idx]);}
function setMat(id,row,col){if(!ans[id])ans[id]={};ans[id][row]=col;saveProgress();renderQ(vq[idx]);}
function setSta(id,v){ans[id]=v;saveProgress();renderQ(vq[idx]);}
function setTxt(id,v){ans[id]=v;saveProgress();}
function updateCharCount(id,max,len){
  const el=document.getElementById('cc'+id);
  if(el){
    el.textContent=len+'/'+max;
    el.style.color=len>max*0.85?'rgba(255,150,100,.7)':'rgba(255,255,255,.35)';
  }
}
function filtSta(s,id){
  const g=document.getElementById('sg'+id);if(!g)return;
  const sel=ans[id];
  g.innerHTML=STA_LIST.filter(x=>x.includes(s))
    .map(x=>`<div class="sitem${sel===x?' sel':''}" onclick="setSta(${id},'${x.replace(/'/g,"\\'")}')">${x}</div>`).join('');
}

// ════════════════════════════════════════════════════════════
// RENDER COMPONENTS
// ════════════════════════════════════════════════════════════
function otherBox(qId){
  const v=(ansOther[qId]||'').replace(/"/g,'&quot;');
  return`<input id="otherInp${qId}" class="other-inp" type="text" placeholder="يرجى التحديد..." value="${v}" oninput="setOther(${qId},this.value)">
    <div id="otherErr${qId}" class="other-err" style="display:none;color:#e74c3c;font-size:.75rem;margin-top:.25rem;text-align:right">⚠️ من فضلك اكتب إجابتك أولاً</div>`;
}

function renderScale(q){
  const l=SL[q.st]||SL.satisfaction, v=ans[q.id]||null;
  const lowLit  = v===1 ? ' lit' : '';
  const highLit = v===5 ? ' lit' : '';
  const btns = [1,2,3,4,5].map(i=>{
    const sel = v===i ? ' sel' : '';
    // Button 3 gets "محايد" label underneath
    if(i===3){
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:.22rem;flex:1;max-width:60px">
        <button class="sbtn${sel}" style="width:100%" onclick="setScale(${q.id},${i})">${i}</button>
        <span style="font-size:.78rem;color:#D4A017;font-weight:700;
          white-space:nowrap;opacity:${v===3?1:.55};transition:opacity .2s">محايد</span>
      </div>`;
    }
    return `<button class="sbtn${sel}" onclick="setScale(${q.id},${i})">${i}</button>`;
  }).join('');
  return`<div>
    <div class="slbls">
      <span class="slbl-low${lowLit}">${l.low}</span>
      <span class="slbl-high${highLit}">${l.high}</span>
    </div>
    <div class="sbtns" style="align-items:flex-start">${btns}</div>
    <div class="semoji">${l.emojis.map((e,i)=>`<span style="opacity:${v===i+1?1:.22};transition:opacity .2s;font-size:1.05rem">${e}</span>`).join('')}</div>
  </div>`;
}

function renderNPS(q){
  const v=ans[q.id];
  let b='';
  for(let i=0;i<=10;i++){
    let c='';if(v===i)c=i<=6?'det':i<=8?'pas':'pro';
    b+=`<button class="nbtn${c?' '+c:''}" onclick="setNPS(${q.id},${i})">${i}</button>`;
  }
  return`<div>
    <div class="ngrid">${b}</div>
    <div class="nlbls"><span>😠 لن أرشح إطلاقًا</span><span>😊 سأرشح بشدة</span></div>
  </div>`;
}

function renderMatrix(q){
  const m=ans[q.id]||{};
  const rows=q.rows.map(r=>`<tr class="mrow"><td>${r}</td>${q.cols.map(c=>`<td><div class="mrad${m[r]===c?' sel':''}" onclick="setMat(${q.id},'${r}','${c}')"></div></td>`).join('')}</tr>`).join('');
  return`<div class="mwrap">
    <div class="mhint" style="margin-bottom:.6rem;font-size:.78rem;color:rgba(255,255,255,.55);text-align:center">هل المترو أفضل، أسوأ، أم نفس الشيء؟</div>
    <table class="mtbl">
    <tr><th></th>${q.cols.map(c=>`<th>${c}</th>`).join('')}</tr>${rows}
  </table></div>`;
}

function renderStation(q){
  const s=ans[q.id]||null;
  return`<input class="ssearch" type="text" placeholder="ابحث عن محطة..." oninput="filtSta(this.value,${q.id})" id="ss${q.id}">
    <div class="sgrid" id="sg${q.id}">${STA_LIST.map(x=>`<div class="sitem${s===x?' sel':''}" onclick="setSta(${q.id},'${x.replace(/'/g,"\\'")}')">${x}</div>`).join('')}</div>`;
}

function buildTrainBar(pct, total){
  var isGL3 = MODE==='gl3';
  var numDots=8, step=100/(numDots-1), dots='';
  for(var i=0;i<numDots;i++){
    var needed=(numDots-1-i)*step;
    var lit=pct>=needed-0.5;
    dots+='<div class="sdot'+(lit?' lit':'')+'"></div>';
  }
  // pct=0 → train far right (left=88%); pct=100 → train far left (left=0%)
  var leftPct=Math.max(0,Math.min(88-(pct/100)*88,88));
  var trainSrc=isGL3?GL3_TRAIN_IMG:LRT_TRAIN_IMG;
  var slprs=Array(24).fill('<div class="slpr"></div>').join('');
  return '<div class="train-track-wrap">'
    +'<div class="slpr-row">'+slprs+'</div>'
    +'<div class="rail-a"></div>'
    +'<div class="rail-b"></div>'
    +'<div class="track-done" style="width:'+pct+'%"></div>'
    +'<div class="sdots">'+dots+'</div>'
    +'<div class="train-wrap" style="left:'+leftPct+'%">'
    +'<img src="'+trainSrc+'" alt="train" class="train-img">'
    +'</div>'
    +'</div>';
}

function renderQ(q){
  const total=vq.length, pos=vq.indexOf(q)+1, pct=Math.round(pos/total*100), isLast=pos===total;
  const srvShort = MODE==='gl3' ? 'GL3' : 'LRT';
  const srvEmoji = MODE==='gl3' ? '🚇' : '🚆';
  // Resolve function-based text and opts (for dynamic questions like Q351)
  q = Object.assign({}, q);
  if(typeof q.text === 'function') q.text = q.text(ans);
  if(typeof q.opts === 'function') q.opts = q.opts(ans);
  let inp='';

  if(q.type==='single'){
    const logoHtml = q.id===30 ? `<div class="logo-q-wrap"><div class="logo-q-img"><img src="${MODE==='gl3'?GL3_LOGO:LRT_LOGO}" alt="logo"></div></div>` : '';
    inp=logoHtml+`<div class="olist">${q.opts.map(o=>{
      const sel=ans[q.id]===o;
      let h=`<button class="obtn${sel?' sel':''}" onclick="selOpt(${q.id},'${o.replace(/'/g,"\\'")}','single')">
        <span class="oind"></span><span class="olbl">${o}</span></button>`;
      if(o===OTHER_OPT&&sel)h+=otherBox(q.id);
      return h;
    }).join('')}</div>`;
  }else if(q.type==='multi'){
    const s=ans[q.id]||[];
    inp=`<div class="mhint">☑️ يمكنك اختيار أكثر من إجابة</div>
      <div class="olist">${q.opts.map(o=>{
        const sel=s.includes(o);
        let h=`<button class="obtn${sel?' sel':''}" onclick="selOpt(${q.id},'${o.replace(/'/g,"\\'")}','multi')">
          <span class="mind"></span><span class="olbl">${o}</span></button>`;
        if(o===OTHER_OPT&&sel)h+=otherBox(q.id);
        return h;
      }).join('')}</div>`;
  }else if(q.type==='multi3'){
    const s=ans[q.id]||[];
    inp=`<div class="mhint">☑️ اختر حتى 3 إجابات (${s.length}/3)</div>
      <div class="olist">${q.opts.map(o=>{
        const sel=s.includes(o);
        let h=`<button class="obtn${sel?' sel':''}" onclick="selOpt(${q.id},'${o.replace(/'/g,"\\'")}','multi3')">
          <span class="mind"></span><span class="olbl">${o}</span></button>`;
        if(o===OTHER_OPT&&sel)h+=otherBox(q.id);
        return h;
      }).join('')}</div>`;
  }else if(q.type==='scale'){inp=renderScale(q);
  }else if(q.type==='nps'){inp=renderNPS(q);
  }else if(q.type==='matrix'){inp=renderMatrix(q);
  }else if(q.type==='station'){inp=renderStation(q);
  }else if(q.type==='text'){
    inp=`<textarea class="sta" placeholder="${q.ph||'اكتب إجابتك هنا...'}" oninput="setTxt(${q.id},this.value)">${ans[q.id]||''}</textarea>`;
  }else if(q.type==='shorttext'){
    const mx=q.maxlen||120;
    const cv=(ans[q.id]||'').length;
    inp=`<div style="position:relative">
      <input type="text" class="sta" style="min-height:auto;padding:.85rem 1rem;border-radius:13px"
        placeholder="${q.ph||'اكتب إجابتك هنا...'}"
        maxlength="${mx}"
        value="${(ans[q.id]||'').replace(/"/g,'&quot;')}"
        oninput="setTxt(${q.id},this.value);updateCharCount(${q.id},${mx},this.value.length)">
      <div id="cc${q.id}" style="text-align:left;font-size:.65rem;color:rgba(255,255,255,.35);margin-top:.3rem">${cv}/${mx}</div>
    </div>`;
  }

  document.getElementById('app').innerHTML=`
    <div style="display:flex;flex-direction:column;min-height:100vh">
      <div class="hdr">
        <div class="logo">
          <div class="lbadge-img ${MODE==='gl3'?'lbadge-gl3':'lbadge-lrt'}">
            <img src="${MODE==='gl3'?GL3_LOGO:LRT_LOGO}" alt="logo" class="hdr-logo-img">
          </div>
        </div>
      </div>
      <div class="pcon">${buildTrainBar(pct,total)}</div>
      <div class="qwrap">
        <div class="qcard">

          <div class="qtxt">${q.opt?'<span class="otag">اختياري</span>':''}${q.text}</div>
          ${inp}
          <div class="emsg" id="em${q.id}">⚠️ يرجى الإجابة على هذا السؤال</div> 
        </div>
      </div>
      <div class="nav">
        <button class="bnxt" onclick="goNext(${q.id})">${isLast?'✅ إرسال الاستطلاع':'التالي ←'}</button>
        ${idx>0?'<button class="bbck" onclick="goPrev()">→ السابق</button>':''}
        ${q.opt?'<button class="bbck" style="opacity:.7" onclick="goSkip()">تخطي هذا السؤال</button>':''}
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════════
// PAYLOAD BUILDER
// ════════════════════════════════════════════════════════════
function buildVal(qId, rawVal){
  if(Array.isArray(rawVal)){
    const parts=rawVal.map(x=>TR[x]||x);
    if(rawVal.includes(OTHER_OPT)&&ansOther[qId]){
      const oi=parts.indexOf('Other (specify)');
      if(oi>-1)parts[oi]='Other: '+ansOther[qId];
    }
    return parts.join(' | ');
  }
  let v=TR[rawVal]||rawVal||'';
  if(rawVal===OTHER_OPT&&ansOther[qId])v='Other: '+ansOther[qId];
  return v;
}


// ════════════════════════════════════════════════════════════
// DROP-OFF BEACON  — fires on tab-close / navigation away
// Sends partial answers via sendBeacon (reliable on unload).
// The Apps Script upserts by session_id so the same row is
// updated if the user progresses further then drops again.
// ════════════════════════════════════════════════════════════
function buildPartialPayload(){
  if(!MODE || !SESSION_ID) return null;
  const a = ans;
  const bv = (id) => buildVal(id, a[id]);
  const lastQLabel = (vq && vq[idx]) ? ('Q'+vq[idx].id) : 'unknown';
  return {
    type:            'partial',
    session_id:      SESSION_ID,
    completion_status: 'partial',
    last_question:   lastQLabel,
    drop_off_time:   new Date().toISOString(),
    survey_type:     MODE==='gl3' ? 'GL3 Green Line 3' : 'LRT Capital Train',
    survey_month:    surveyMonth(),
    fingerprint:     fingerprint(),
    start_time:      surveyStartTime ? new Date(surveyStartTime).toISOString() : '',
    Q1:bv(1),Q2:bv(2),Q3:bv(3),Q4:bv(4),

function sendDropoff(){
  if(!GURL || GURL==='YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') return;
  if(!MODE || !SESSION_ID) return;
  if(surveyCompleted) return; // don't overwrite a completed submission
  const payload = buildPartialPayload();
  if(!payload) return;
  // Use fetch with no-cors + keepalive — most reliable for Apps Script
  // keepalive:true ensures it fires even as the page is closing
  fetch(GURL, {
    method:'POST',
    mode:'no-cors',
    keepalive:true,
    body: JSON.stringify(payload)
  }).catch(function(){});
}

// Hook exit events
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'hidden') sendDropoff();
});
window.addEventListener('pagehide', function(){ sendDropoff(); });

function toggleWaPopup(e){

async function chooseSurvey(mode){
  // Fast path: same-browser localStorage check (instant, no network)
  if(isSubmitted(mode)){renderBlocked(mode);return;}

  // Authoritative path: ask the server too — covers QR-code scans that
  // open in an isolated in-app browser with empty localStorage.
  // Shows a brief loading state while checking.
  showCheckingScreen(mode);
  const alreadyDone = await checkAlreadySubmittedServer(mode);
  if(alreadyDone){
    markDone(mode); // sync localStorage so future checks are instant
    renderBlocked(mode);
    return;
  }

  initSurvey(mode);
  try{
    let sid=sessionStorage.getItem('rdmc_session_id');
    if(!sid){sid='rdmc-'+Date.now()+'-'+Math.random().toString(36).slice(2,9);sessionStorage.setItem('rdmc_session_id',sid);}
    SESSION_ID=sid;
  }catch(e){SESSION_ID='rdmc-'+Date.now();}
  // Check for saved progress in this session
  const saved = loadProgress(mode);
  if(saved && saved.idx > 0){
    // Restore state
    ans           = saved.ans           || {};
    ansOther      = saved.ansOther      || {};
    idx           = saved.idx           || 0;
    surveyStartTime = saved.surveyStartTime || null;
    shownGames    = saved.shownGames    || {};
    vq            = getVQ();
    if(idx >= vq.length) idx = vq.length - 1;
    // Show resume prompt
    renderResumePrompt(mode);
  } else {
    renderIntro();
  }
}

// Brief loading screen shown while the server-side check runs
function showCheckingScreen(mode){
  applyTheme(mode);
  document.getElementById('app').innerHTML=`
    <div class="blocked">
      <div class="bico">⏳</div>
      <div class="btitle">جاري التحقق...</div>
    </div>`;
}

// Ask Apps Script if this device/fingerprint already completed
// this survey this month. Read-only — does not write anything.
// Uses GET with query params: doPost responses are not reliably
// readable cross-origin, but doGet responses are — this is the
// only combination that actually works with Apps Script + fetch.
async function checkAlreadySubmittedServer(mode){
  if(!GURL || GURL==='YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') return false;
  try{
    const params = new URLSearchParams({
      action: 'check',
      survey_type: mode==='gl3' ? 'GL3 Green Line 3' : 'LRT Capital Train',
      survey_month: surveyMonth(),
      fingerprint: fingerprint()
    });
    const resp = await fetch(GURL + '?' + params.toString(), { method:'GET' });
    const json = await resp.json();
    return json && json.status === 'submitted';
  }catch(e){
    // Network issue — fail open so a real passenger is never
    // wrongly blocked due to a connectivity hiccup.
    return false;
  }
}

  const isGL3 = mode==='gl3';

    </div>`;
}

function resumeSurvey(){
  renderQ(vq[idx]);

}
